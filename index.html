<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description"
        content="Smart Trip Planner - Plan trips, track itinerary, transport, and expenses offline">
    <meta name="theme-color" content="#131722">

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trip Planner">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">

    <!-- Google Fonts: Playfair Display (headings) + Outfit (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">

    <title>MyTrip - Travel Planner</title>
    <link rel="stylesheet" href="styles.css?v=105">
    <link rel="stylesheet" href="cloud-sync-styles.css?v=105">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="config.js"></script>
    <script>
        // Firebase configuration — loaded from config.js (gitignored)
        const firebaseConfig = (typeof APP_CONFIG !== 'undefined' && APP_CONFIG.firebaseConfig)
            ? APP_CONFIG.firebaseConfig
            : null;

        if (firebaseConfig) {
            try {
                firebase.initializeApp(firebaseConfig);
                console.log('[Firebase] Initialized successfully');
            } catch (error) {
                console.log('[Firebase] Error:', error.message);
            }
        } else {
            console.log('[Firebase] No config found — running in offline mode');
        }
    </script>
</head>

<body>
    <!-- App Container -->
    <div id="app" class="app-container">


        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <span>MyTrip</span>
                </h1>
                <div class="header-actions">
                    <!-- Sync Status with label -->
                    <div class="sync-status-container">
                        <div id="syncStatus" class="sync-status" title="Click for details">📴</div>
                        <span id="syncStatusText" class="sync-status-text">Local only</span>
                    </div>
                    <!-- Force Sync Button in header -->
                    <button id="headerSyncBtn" class="sync-now-btn" onclick="AccountUI.handleForceSync()"
                        title="Force Sync" aria-label="Force Sync">
                        🔄
                    </button>
                    <!-- Account Button -->
                    <div class="account-container">
                        <button id="accountButton" class="account-button" aria-label="Account">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </button>
                        <!-- Account Dropdown -->
                        <div id="accountDropdown" class="account-dropdown hidden">
                            <div id="accountDropdownContent"></div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Sync Progress Bar (persistent, lives outside dropdown) -->
        <div id="syncProgressBar"
            style="display:none; position:sticky; top:0; z-index:999; height:3px; background:rgba(255,255,255,0.1);">
            <div id="syncProgressFill"
                style="height:100%; width:0%; background:linear-gradient(90deg,#f5a623,#f7c948); transition:width 0.4s ease; border-radius:0 2px 2px 0;">
            </div>
        </div>
        <div id="syncStatusMsg"
            style="display:none; text-align:center; padding:6px 12px; font-size:0.75rem; font-weight:500; background:rgba(245,166,35,0.12); color:#f5a623; letter-spacing:0.02em;">
        </div>

        <!-- Main Content -->
        <main id="mainContent" class="main-content">

            <!-- Welcome Screen (shown when no trips) -->
            <section id="welcomeScreen" class="welcome-screen">
                <div class="welcome-content">
                    <div class="welcome-illustration">🗺️</div>
                    <h2 class="welcome-title">Ready for your next adventure?</h2>
                    <p class="welcome-text">Let's plan your trip together. I'll help you organize everything and track
                        your expenses.</p>
                    <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                        <button id="createFirstTripBtn" class="btn btn-primary btn-large">
                            <span>Start Planning</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </button>
                        <button id="importFirstTripBtn" class="btn btn-secondary btn-large"
                            onclick="window.app && window.app.triggerImport()">
                            <span>Import Trip</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Trip List (shown when trips exist) -->
            <section id="tripListScreen" class="trip-list-screen hidden">
                <div class="screen-header">
                    <h2 class="screen-title">Your Trips</h2>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="importTripBtn" class="btn btn-secondary"
                            onclick="window.app && window.app.triggerImport()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <span>Import</span>
                        </button>
                        <button id="createTripBtn" class="btn btn-secondary">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            <span>New Trip</span>
                        </button>
                    </div>
                </div>
                <div id="tripList" class="trip-list"></div>
            </section>

            <!-- Trip Creation/Edit Form -->
            <section id="tripFormScreen" class="trip-form-screen hidden">
                <div class="form-container">
                    <div class="form-header">
                        <button id="backToListBtn" class="icon-btn" aria-label="Back">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                        </button>
                        <h2 id="formTitle" class="form-title">Plan Your Trip</h2>
                    </div>
                    <form id="tripForm" class="trip-form"></form>
                </div>
            </section>

            <!-- Trip Detail View -->
            <section id="tripDetailScreen" class="trip-detail-screen hidden">
                <div id="tripDetailContent"></div>
            </section>

        </main>

        <!-- Toast Notifications -->
        <div id="toastContainer" class="toast-container" aria-live="polite"></div>

        <!-- Modal Overlay -->
        <div id="modalOverlay" class="modal-overlay hidden">
            <div id="modalContent" class="modal-content"></div>
        </div>

    </div>

    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="loading-indicator hidden">
        <div class="spinner"></div>
    </div>

    <!-- Scripts -->
    <!-- Hidden File Input for Import -->
    <input type="file" id="importTripInput" accept=".json" style="display: none;">

    <!-- PDF.js - for reading PDF travel documents -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <script src="uuid-generator.js?v=105"></script>
    <script src="storage.js?v=105"></script>
    <script src="charts.js?v=105"></script>
    <script src="reports.js?v=105"></script>
    <script src="ui-components.js?v=105"></script>
    <script src="expense-model.js?v=105"></script>
    <script src="gemini-service.js?v=105"></script>
    <!-- Main App -->
    <script src="bundle.js?v=105"></script>
    <script>
        // Force SW update
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js?v=105').then(reg => {
                reg.update();
            });
        }
    </script>

    <!-- Cloud Sync Services -->
    <script src="auth-service.js?v=105"></script>
    <!-- REMOVED LEGACY SYNC SERVICE -->
    <script src="sync-service-enhanced.js?v=105"></script>
    <script src="conflict-logger.js?v=105"></script>
    <script src="conflict-resolver.js?v=105"></script>
    <script src="sync-queue.js?v=105"></script>
    <script src="background-sync.js?v=105"></script>
    <script src="auth-ui.js?v=105"></script>
    <script src="account-ui.js?v=105"></script>

    <!-- Initialize Cloud Services -->
    <script>
        // Initialize auth and sync services if Firebase is available
        if (window.firebase && window.firebase.apps.length > 0) {
            AuthService.init();
            // Legacy SyncService removed
            SyncServiceEnhanced.init();
            SyncQueue.init();
            BackgroundSync.init();
            console.log('[App] Cloud sync enabled');
        } else {
            console.log('[App] Running in offline-only mode');
        }
    </script>

    <!-- Back Navigation Protection -->
    <script>
        // Prevent accidental data loss on back navigation
        let formDirty = false;

        // Track form changes
        document.addEventListener('input', (e) => {
            if (e.target.form) {
                formDirty = true;
            }
        });

        // Reset on successful save
        document.addEventListener('submit', (e) => {
            formDirty = false;
        });

        // Warn before leaving with unsaved changes
        window.addEventListener('beforeunload', (e) => {
            if (formDirty) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });
    </script>


    <!-- Service Worker Registration -->
    <script>
        // Register service worker only in production
        if ('serviceWorker' in navigator) {
            // Check if running in production (not localhost or file://)
            const isProduction = window.location.protocol === 'https:' ||
                window.location.hostname === 'localhost' ||
                window.location.hostname === '127.0.0.1';

            if (isProduction) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./service-worker.js')
                        .then(registration => {
                            console.log('[App] Service Worker registered:', registration.scope);

                            // Check for updates
                            registration.addEventListener('updatefound', () => {
                                const newWorker = registration.installing;
                                newWorker.addEventListener('statechange', () => {
                                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        // New version available
                                        console.log('[App] New version available! Refresh to update.');

                                        // Optional: Show update notification to user
                                        if (window.UIComponents && window.UIComponents.showToast) {
                                            UIComponents.showToast(
                                                'New version available! Refresh to update.',
                                                'info',
                                                5000
                                            );
                                        }
                                    }
                                });
                            });

                            // Auto-update check every hour
                            setInterval(() => {
                                registration.update();
                            }, 60 * 60 * 1000);
                        })
                        .catch(error => {
                            console.error('[App] Service Worker registration failed:', error);
                        });
                });
            } else {
                console.log('[App] Service Worker disabled in development');
            }
        }
    </script>

</body>

</html>
