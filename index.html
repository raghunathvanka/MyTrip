    <!-- Back Navigation Protection -->
    <script>
        // Prevent accidental data loss on back navigation
        let formDirty = false;

        // Track form changes
        document.addEventListener('input', (e) => {
            if (e.target.form) {
                formDirty = true;
            }
        });

        // Reset on successful save
        document.addEventListener('submit', (e) => {
            formDirty = false;
        });

        // Warn before leaving with unsaved changes
        window.addEventListener('beforeunload', (e) => {
            if (formDirty) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });
    </script>


    <!-- Service Worker Registration -->
    <script>
        // Register service worker only in production
        if ('serviceWorker' in navigator) {
            // Check if running in production (not localhost or file://)
            const isProduction = window.location.protocol === 'https:' ||
                window.location.hostname === 'localhost' ||
                window.location.hostname === '127.0.0.1';

            if (isProduction) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./service-worker.js')
                        .then(registration => {
                            console.log('[App] Service Worker registered:', registration.scope);

                            // Check for updates
                            registration.addEventListener('updatefound', () => {
                                const newWorker = registration.installing;
                                newWorker.addEventListener('statechange', () => {
                                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        // New version available
                                        console.log('[App] New version available! Refresh to update.');

                                        // Optional: Show update notification to user
                                        if (window.UIComponents && window.UIComponents.showToast) {
                                            UIComponents.showToast(
                                                'New version available! Refresh to update.',
                                                'info',
                                                5000
                                            );
                                        }
                                    }
                                });
                            });

                            // Auto-update check every hour
                            setInterval(() => {
                                registration.update();
                            }, 60 * 60 * 1000);
                        })
                        .catch(error => {
                            console.error('[App] Service Worker registration failed:', error);
                        });
                });
            } else {
                console.log('[App] Service Worker disabled in development');
            }
        }
    </script>

    <!-- Tab Bar Controller (safe: no MutationObserver) -->
    <script>
        (function () {
            var tabBar = document.getElementById('bottomTabBar');
            if (!tabBar) return;

            // Screen IDs that should HIDE the tab bar
            var HIDE_ON = ['welcomeScreen', 'tripFormScreen', 'tripListScreen'];

            // Scroll targets per tab (multiple selectors, first match wins)
            var TARGETS = {
                itinerary: ['.day-card', '.day-section', '[data-section="itinerary"]'],
                budget: ['.budget-primary-summary', '.budget-overview-grid', '[data-section="budget"]'],
                bookings: ['.prebooking-card', '[data-section="bookings"]']
            };

            function isTripDetailActive() {
                // All HIDE_ON screens must be hidden
                for (var i = 0; i < HIDE_ON.length; i++) {
                    var el = document.getElementById(HIDE_ON[i]);
                    if (el && !el.classList.contains('hidden')) return false;
                }
                // At least one day card must exist in the DOM
                return !!document.querySelector('.day-card, .day-section');
            }

            function updateVisibility() {
                var show = isTripDetailActive();
                if (show && !tabBar.classList.contains('visible')) {
                    tabBar.classList.add('visible');
                } else if (!show && tabBar.classList.contains('visible')) {
                    tabBar.classList.remove('visible');
                }
            }

            function setActive(name) {
                tabBar.querySelectorAll('.tab-item').forEach(function (btn) {
                    btn.classList.toggle('active', btn.dataset.tab === name);
                });
            }

            function scrollTo(name) {
                var selectors = TARGETS[name];
                if (!selectors) return;
                var container = document.querySelector('.app-container') || document.getElementById('app') || window;
                for (var i = 0; i < selectors.length; i++) {
                    var el = document.querySelector(selectors[i]);
                    if (el) {
                        var top = el.getBoundingClientRect().top + (container.scrollTop || 0) - 80;
                        try { container.scrollTo({ top: top, behavior: 'smooth' }); } catch (e) { }
                        return;
                    }
                }
            }

            // Tab clicks
            tabBar.addEventListener('click', function (e) {
                var btn = e.target.closest('.tab-item');
                if (!btn) return;
                setActive(btn.dataset.tab);
                scrollTo(btn.dataset.tab);
            });

            // Poll every 400ms — lightweight, no infinite loop risk
            setInterval(updateVisibility, 400);
            // Also run immediately after app boots
            setTimeout(updateVisibility, 800);
        })();
    </script>

    <!-- Parallax scroll for landing mountains -->
    <script>
        (function () {
            var back = document.getElementById('landBack');
            var mid = document.getElementById('landMid');
            var front = document.getElementById('landFront');
            var scroller = document.querySelector('.app-container') || document.getElementById('app');
            if (!scroller || !back) return;
            scroller.addEventListener('scroll', function () {
                var s = scroller.scrollTop;
                if (back) back.style.transform = 'translateY(' + (s * 0.1) + 'px)';
                if (mid) mid.style.transform = 'translateY(' + (s * 0.2) + 'px)';
                if (front) front.style.transform = 'translateY(' + (s * 0.3) + 'px)';
            }, { passive: true });
        })();
    </script>

    <!-- Step indicator controller for planning form -->
    <script>
        (function () {
            function updateSteps() {
                var steps = document.querySelectorAll('.pf-step');
                var lines = document.querySelectorAll('.pf-step-line');
                if (!steps.length) return;

                var scroller = document.querySelector('.app-container') || document.getElementById('app');
                if (!scroller) return;

                // Milestones: percentage of total scroll within the form screen
                var totalH = scroller.scrollHeight - scroller.clientHeight;
                var pct = totalH > 0 ? scroller.scrollTop / totalH : 0;

                var activeIdx = pct < 0.35 ? 0 : pct < 0.70 ? 1 : 2;

                steps.forEach(function (s, i) {
                    s.classList.toggle('active', i === activeIdx);
                    s.classList.toggle('done', i < activeIdx);
                });
                lines.forEach(function (l, i) {
                    l.classList.toggle('done', i < activeIdx);
                });
            }

            // Run when form becomes visible
            var scroller = document.querySelector('.app-container') || document.getElementById('app');
            if (scroller) {
                scroller.addEventListener('scroll', updateSteps, { passive: true });
            }
            // Also update when form is shown (poll)
            setInterval(function () {
                if (!document.getElementById('tripFormScreen').classList.contains('hidden')) {
                    updateSteps();
                }
            }, 600);
        })();
    </script>

    <!-- ═══ POLISH JS CONTROLLER — micro-interactions & transitions ═══ -->
    <script>
        (function () {
            'use strict';

            /* ── 1. HEADER SCROLL OPACITY ─────────────────────────────── */
            (function () {
                var header = document.querySelector('.app-header');
                if (!header) return;
                var scroller = document.querySelector('.app-container') || document.getElementById('app');
                if (!scroller) return;
                var lastY = 0;
                scroller.addEventListener('scroll', function () {
                    var y = scroller.scrollTop;
                    if (y > 40) {
                        header.classList.add('header-scrolled');
                    } else {
                        header.classList.remove('header-scrolled');
                    }
                    lastY = y;
                }, { passive: true });
            })();

            /* ── 2. PAGE TRANSITIONS — watch hidden class changes ─────── */
            (function () {
                var SCREENS = ['welcomeScreen', 'tripFormScreen', 'tripListScreen', 'tripDetailScreen'];
                var prevVisible = null;

                function getVisible() {
                    for (var i = 0; i < SCREENS.length; i++) {
                        var el = document.getElementById(SCREENS[i]);
                        if (el && !el.classList.contains('hidden')) return SCREENS[i];
                    }
                    return null;
                }

                var observer = new MutationObserver(function () {
                    var now = getVisible();
                    if (now === prevVisible) return;

                    var fromScreen = prevVisible;
                    var toScreen = now;
                    prevVisible = now;

                    if (!toScreen) return;
                    var toEl = document.getElementById(toScreen);
                    if (!toEl) return;

                    // Determine direction
                    var ORDER = { welcomeScreen: 0, tripListScreen: 1, tripFormScreen: 2, tripDetailScreen: 3 };
                    var fromIdx = fromScreen ? (ORDER[fromScreen] || 0) : -1;
                    var toIdx = ORDER[toScreen] || 0;

                    if (toScreen === 'tripDetailScreen') {
                        // Sheet-up handled purely by CSS :not(.hidden)
                    } else if (toIdx > fromIdx) {
                        // Forward — enter from right
                        toEl.classList.add('screen-enter-right');
                        setTimeout(function () { toEl.classList.remove('screen-enter-right'); }, 400);
                    } else if (fromScreen && toIdx < fromIdx) {
                        // Back — enter from left
                        toEl.classList.add('screen-enter-left');
                        setTimeout(function () { toEl.classList.remove('screen-enter-left'); }, 350);
                    }
                });

                // Observe each screen for class changes
                SCREENS.forEach(function (id) {
                    var el = document.getElementById(id);
                    if (el) observer.observe(el, { attributes: true, attributeFilter: ['class'] });
                });

                prevVisible = getVisible();
            })();

            /* ── 3. INTERSECTION OBSERVER — boarding pass day cards ────── */
            (function () {
                var delay = 0;

                function observeCards() {
                    var cards = document.querySelectorAll('#daysList .card:not(.bp-visible)');
                    if (!cards.length) return;

                    var io = new IntersectionObserver(function (entries) {
                        entries.forEach(function (entry) {
                            if (!entry.isIntersecting) return;
                            var card = entry.target;
                            var idx = Array.from(card.parentNode.children).indexOf(card);
                            setTimeout(function () {
                                card.classList.add('bp-visible');
                            }, idx * 100);
                            io.unobserve(card);
                        });
                    }, { threshold: 0.1 });

                    cards.forEach(function (c) { io.observe(c); });
                }

                // Re-run whenever #daysList content changes
                var daysListEl = document.getElementById('daysList');
                if (daysListEl) {
                    var cardObserver = new MutationObserver(function () {
                        setTimeout(observeCards, 80);
                    });
                    cardObserver.observe(daysListEl, { childList: true });
                }

                // Also run immediately and on a poll for initial render
                setInterval(function () {
                    if (document.querySelector('#daysList .card:not(.bp-visible)')) {
                        observeCards();
                    }
                }, 800);
            })();

            /* ── 4. AI SCAN BORDER SPINNER ──────────────────────────── */
            (function () {
                function watchScanState() {
                    var scanDiv = document.querySelector('.trip-form > div:first-child');
                    if (!scanDiv) return;

                    var loadingEl = document.getElementById('trip_scan_loading');
                    if (!loadingEl) return;

                    var mo = new MutationObserver(function () {
                        var isLoading = loadingEl.style.display !== 'none';
                        if (isLoading) {
                            scanDiv.classList.add('scanning');
                        } else {
                            scanDiv.classList.remove('scanning');
                        }
                    });
                    mo.observe(loadingEl, { attributes: true, attributeFilter: ['style'] });
                }

                // Run when form is visible
                setInterval(function () {
                    var fs = document.getElementById('tripFormScreen');
                    if (fs && !fs.classList.contains('hidden')) {
                        watchScanState();
                    }
                }, 1200);
            })();

            /* ── 5. ITEM CARD NEW — animate on DOM insert ─────────────── */
            (function () {
                function watchItemCards() {
                    var daysList = document.getElementById('daysList');
                    if (!daysList) return;

                    var cardObserver = new MutationObserver(function (mutations) {
                        mutations.forEach(function (m) {
                            m.addedNodes.forEach(function (node) {
                                if (node.nodeType !== 1) return;
                                // Find .item-card elements inside newly added nodes
                                var items = node.classList && node.classList.contains('item-card')
                                    ? [node]
                                    : Array.from(node.querySelectorAll('.item-card'));
                                items.forEach(function (item) {
                                    item.classList.add('item-new');
                                    setTimeout(function () { item.classList.remove('item-new'); }, 400);
                                });
                            });
                        });
                    });

                    cardObserver.observe(daysList, { childList: true, subtree: true });
                }
                setTimeout(watchItemCards, 500);
            })();

            /* ── 6. BUDGET BAR RE-ANIMATE on detail entry ───────────── */
            (function () {
                var detailScreen = document.getElementById('tripDetailScreen');
                if (!detailScreen) return;

                var screenObserver = new MutationObserver(function () {
                    if (!detailScreen.classList.contains('hidden')) {
                        // give detail time to render, then restart bar animation
                        setTimeout(function () {
                            var bars = detailScreen.querySelectorAll('[style*="animation:budgetBarIn"]');
                            bars.forEach(function (bar) {
                                bar.style.animation = 'none';
                                // Force reflow
                                void bar.offsetWidth;
                                bar.style.animation = '';
                            });
                            // Also check if over-budget — shake
                            var overPill = detailScreen.querySelector('.budget-status-pill.over-budget');
                            if (overPill) {
                                var valEl = overPill.closest('.budget-primary-summary');
                                if (valEl) {
                                    valEl.classList.add('budget-shake');
                                    setTimeout(function () { valEl.classList.remove('budget-shake'); }, 500);
                                }
                            }
                        }, 600);
                    }
                });
                screenObserver.observe(detailScreen, { attributes: true, attributeFilter: ['class'] });
            })();

            /* ── 7. PAYMENT PROGRESS BARS in prebooking cards ─────────── */
            (function () {
                function injectPbBars() {
                    var cards = document.querySelectorAll('#prebookingsList .prebooking-card');
                    cards.forEach(function (card) {
                        // Skip if already injected
                        if (card.querySelector('.pb-progress-wrap')) return;

                        // Extract paid and total amounts from the text in the card
                        var text = card.textContent || '';
                        var totalMatch = text.match(/Total[:\s]+₹([\d,]+)/);
                        var paidMatch = text.match(/Paid[:\s]+₹([\d,]+)/);
                        if (!totalMatch || !paidMatch) return;

                        var total = parseFloat(totalMatch[1].replace(/,/g, '')) || 0;
                        var paid = parseFloat(paidMatch[1].replace(/,/g, '')) || 0;
                        if (total <= 0) return;

                        var pct = Math.min(Math.round((paid / total) * 100), 100);
                        var label = '\u20b9' + paid.toLocaleString('en-IN') +
                            ' paid of \u20b9' + total.toLocaleString('en-IN');

                        var wrap = document.createElement('div');
                        wrap.className = 'pb-progress-wrap';
                        wrap.innerHTML =
                            '<div class="pb-progress-label">' + label + '</div>' +
                            '<div class="pb-progress-track">' +
                            '<div class="pb-progress-fill" data-pct="' + pct + '"></div>' +
                            '</div>';

                        // Insert below the info row (last child of the content div)
                        var contentDiv = card.querySelector('div > div:first-child');
                        if (contentDiv) contentDiv.appendChild(wrap);
                        else card.appendChild(wrap);

                        // Animate on scroll into view
                        var fill = wrap.querySelector('.pb-progress-fill');
                        var io = new IntersectionObserver(function (entries) {
                            entries.forEach(function (entry) {
                                if (!entry.isIntersecting) return;
                                setTimeout(function () { fill.style.width = pct + '%'; }, 60);
                                io.unobserve(entry.target);
                            });
                        }, { threshold: 0.2 });
                        io.observe(card);
                    });
                }

                // Run on prebookingsList changes
                var pbList = document.getElementById('prebookingsList');
                if (pbList) {
                    new MutationObserver(function () {
                        setTimeout(injectPbBars, 150);
                    }).observe(pbList, { childList: true, subtree: true });
                }

                // Poll for initial render
                setInterval(function () {
                    var pbList2 = document.getElementById('prebookingsList');
                    if (pbList2 && pbList2.children.length) injectPbBars();
                }, 1500);
            })();

        })();
    </script>

</body>
